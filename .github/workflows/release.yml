name: Release

# When changesets land on main, this opens a "Version Packages" PR.
# Merging that PR publishes the bumped package(s) to npm and creates a
# GitHub release for each.
#
# workflow_dispatch is a manual fallback: GitHub does not trigger `push`
# workflows for commits made by the Actions bot (GITHUB_TOKEN), so merging
# the bot-authored version PR may not auto-start this run. Trigger it from
# the Actions tab (or `gh workflow run Release`) to publish in that case.
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # create tags + GitHub releases, push the version PR
  pull-requests: write # open/update the version PR
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm --filter adonisjs-mongoose build

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm publish-package
          commit: 'RELEASING: Releasing package(s)'
          title: 'RELEASING: Releasing package(s)'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
