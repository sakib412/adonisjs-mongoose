name: Release

# When changesets land on main, this opens a "Version Packages" PR.
# Merging that PR publishes the bumped package(s) to npm and creates a
# GitHub release for each.
#
# Fully automatic publish-on-merge requires the GH_PAT secret (a Personal
# Access Token with repo / contents+pull-requests write). With it, the
# version PR is created by a real user, so merging it triggers this run.
# Without it the workflow falls back to GITHUB_TOKEN — which does NOT start
# new runs for bot commits, so after merging the version PR you must trigger
# this manually (Actions tab → Run workflow, or `gh workflow run Release`).
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # create tags + GitHub releases, push the version PR
  pull-requests: write # open/update the version PR
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # PAT (if set) so the version PR is authored by a real user and its
          # merge triggers this workflow; falls back to GITHUB_TOKEN otherwise.
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm --filter adonisjs-mongoose build

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm publish-package
          commit: 'RELEASING: Releasing package(s)'
          title: 'RELEASING: Releasing package(s)'
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # changeset publish ignores publishConfig.provenance; this env var
          # makes npm attach a provenance attestation (needs id-token: write).
          NPM_CONFIG_PROVENANCE: true
